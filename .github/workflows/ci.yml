name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked

      - name: Install dependencies
        run: npm ci

      # Fonts are committed to the repository under fonts/.
      # This step verifies that all files are present and match their expected
      # SHA-256 hashes, catching any accidental corruption or truncation.
      - name: Verify fonts
        run: npm run verify-fonts

      - name: Build WASM (nodejs target — used by unit tests)
        run: wasm-pack build --target nodejs --out-dir pkg
        working-directory: 2a-shaping-wasm/wasm

      - name: Build WASM (bundler target — used by demo)
        run: wasm-pack build --target bundler --out-dir pkg-bundler
        working-directory: 2a-shaping-wasm/wasm

      - name: Build packages
        run: npm run build

      - name: Run unit tests (all workspaces)
        run: npm test --workspaces --if-present

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Run WASM/TS parity test (MT-11)
        run: npx tsx tests/manual/scripts/mt-11-wasm-ts-parity.ts
